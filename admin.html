<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Inbox | Aanya Sharma</title>
  <script>
    (function(){var t=localStorage.getItem("aanya-theme"),d=window.matchMedia("(prefers-color-scheme: dark)").matches;document.documentElement.setAttribute("data-theme",t==="light"||t==="dark"?t:d?"dark":"light");})();
  </script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Main navigation:  ed to the top of the screen while scrolling -->
  <nav class="nav">

    <!-- Brand name (left side): identifies the site owner, links back to home -->
    <a href="index.html" class="nav-brand">Aanya Sharma</a>

    <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="nav-menu">
      <span class="nav-toggle-icon nav-toggle-open" aria-hidden="true">☰</span>
      <span class="nav-toggle-icon nav-toggle-close" aria-hidden="true">✕</span>
    </button>

    <!-- Menu links: full-width dropdown on mobile -->
    <ul class="nav-links" id="nav-menu">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="about.html" class="nav-link">About</a></li>
      <li><a href="projects.html" class="nav-link">Projects</a></li>
      <li><a href="contact.html" class="nav-link">Contact</a></li>
      <li><a href="admin.html" class="nav-link active">Admin</a></li>
    </ul>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode">🌙</button>

  </nav>

  <header class="admin-header">
    <h1 class="admin-title">Inbox</h1>
    <p class="admin-subtitle">All contact-form messages, newest first.</p>
  </header>

  <section class="admin-main">
    <div class="admin-toolbar">
      <p id="admin-count" class="admin-count" aria-live="polite">📬 0 messages</p>
      <label class="admin-filter" for="unread-only-toggle">
        <input type="checkbox" id="unread-only-toggle" class="admin-filter-input">
        <span class="admin-filter-switch" aria-hidden="true"></span>
        <span class="admin-filter-label">Unread only</span>
      </label>
    </div>

    <div id="admin-inbox-grid" class="admin-inbox-grid"></div>
  </section>

  <script src="supabase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
